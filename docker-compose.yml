services:
  dynamodb-local:
    image: amazon/dynamodb-local
    user: root
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/home/dynamodblocal/data"]
    volumes:
      - dynamodb-data:/home/dynamodblocal/data

  app:
    build: .
    ports:
      - "3002:3002"
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
      - PORT=3002
    depends_on:
      - dynamodb-local

volumes:
  dynamodb-data:
